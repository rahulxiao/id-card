<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f4f4f4;
    }

    .hero {
      width: 100%;
      height: 100vh;
      background: url("https://images.unsplash.com/photo-1509062522246-3755977927d7") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
      padding: 20px;
      max-width: 700px;
    }

    .content h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .content p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 14px 30px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="overlay"></div>

    <div class="content">
      <h1>Welcome to the ID Card Generator</h1>
      <p>
        Create professional and modern ID cards easily. Click the button below
        to enter your information and generate your custom card.
      </p>
      <a href="form.html" class="btn">Go to Form</a>
    </div>
  </section>

</body>
</html>
